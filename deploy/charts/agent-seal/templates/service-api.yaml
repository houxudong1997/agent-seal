apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-seal.fullname" . }}-api
  labels:
    app.kubernetes.io/component: api
    {{- include "agent-seal.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - port: {{ .Values.api.servicePort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: api
    {{- include "agent-seal.selectorLabels" . | nindent 4 }}
