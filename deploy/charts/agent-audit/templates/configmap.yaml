apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-audit.fullname" . }}-config
  labels:
    {{- include "agent-audit.labels" . | nindent 4 }}
data:
  # ── Core settings (non-sensitive) ──
  AGENT_AUDIT_STORAGE_BACKEND: {{ .Values.config.storageBackend | quote }}
  AGENT_AUDIT_AUDIT_DIR: {{ .Values.config.auditDir | quote }}
  AGENT_AUDIT_API_HOST: {{ .Values.config.apiHost | quote }}
  AGENT_AUDIT_API_PORT: {{ .Values.api.port | quote }}
  AGENT_AUDIT_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  # ── LLM Tracing ──
  AGENT_AUDIT_AUTO_TRACE: {{ .Values.config.autoTrace | toString | quote }}
  AGENT_AUDIT_TRACE_PII_REDACT: {{ .Values.config.tracePiiRedact | toString | quote }}
  AGENT_AUDIT_TRACE_MAX_LEN: {{ .Values.config.traceMaxLen | quote }}
  AGENT_AUDIT_TRACE_COST_MODEL: {{ .Values.config.traceCostModel | quote }}
  # ── Logging ──
  AGENT_AUDIT_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  AGENT_AUDIT_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  # ── Notifications ──
  AGENT_AUDIT_NOTIFY_ON_FAILURE: {{ .Values.config.notifyOnFailure | toString | quote }}
  # ── Evidence ──
  AGENT_AUDIT_EVIDENCE_STORE: {{ .Values.config.evidenceStore | quote }}
  # ── SMTP host (non-sensitive, port/auth in Secret if needed) ──
  AGENT_AUDIT_SMTP_HOST: {{ .Values.config.smtpHost | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-audit.fullname" . }}-nginx-conf
  labels:
    {{- include "agent-audit.labels" . | nindent 4 }}
data:
  default.conf: |
    {{- tpl .Values.nginx.conf . | nindent 4 }}
{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-audit.fullname" . }}-postgresql-init
  labels:
    {{- include "agent-audit.labels" . | nindent 4 }}
data:
  init.sql: |
    {{- .Values.postgresql.initSql | nindent 4 }}
{{- end }}
