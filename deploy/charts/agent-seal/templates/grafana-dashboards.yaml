{{- if .Values.grafana.enabled }}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $dashboardName := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-seal.fullname" $ }}-grafana-{{ $dashboardName | replace "_" "-" | replace "." "-" }}
  labels:
    {{- include "agent-seal.labels" $ | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
