{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-audit.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/component: postgresql
    {{- include "agent-audit.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/component: postgresql
    {{- include "agent-audit.selectorLabels" . | nindent 4 }}
{{- end }}
