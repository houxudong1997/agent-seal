{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-audit.fullname" . }}-redis
  labels:
    app.kubernetes.io/component: redis
    {{- include "agent-audit.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/component: redis
    {{- include "agent-audit.selectorLabels" . | nindent 4 }}
{{- end }}
