version: "3.8"

# ── agent-audit v1.0 Production Docker Compose ──
# Architecture: nginx (reverse proxy) → api (FastAPI) → PostgreSQL + Redis
# Design: docs/architecture-v1.md §5.3
# ╔══════════════════════════════════════════════════════════════════╗
# ║  SECURITY WARNING - READ BEFORE DEPLOYING                      ║
# ║  You MUST set POSTGRES_PASSWORD in .env before starting.       ║
# ║  Do NOT deploy to production with placeholder credentials.     ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Quick start:
#   1. Copy .env.example to .env and fill in ALL secrets
#   2. docker compose up -d
#   3. Visit http://localhost

services:
  # ════════════════════════════════════════════════════════════════════════
  #  nginx — reverse proxy (TLS termination + SPA static files + API proxy)
  # ════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.27-alpine
    container_name: agent-audit-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./agent_audit/server/static:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - frontend
      - backend

  # ════════════════════════════════════════════════════════════════════════
  #  api — FastAPI application server
  # ════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: agent-audit-api:${AGENT_AUDIT_VERSION:-1.0}
    container_name: agent-audit-api
    expose:
      - "8081"
    environment:
      # ── Core ──
      - AGENT_AUDIT_DB_URL=${AGENT_AUDIT_DB_URL:-postgresql://audit:***@db:5432/agent_audit}
      - AGENT_AUDIT_REDIS_URI=${AGENT_AUDIT_REDIS_URI:-redis://redis:6379/0}
      - AGENT_AUDIT_SECRET_KEY=${AGENT_AUDIT_SECRET_KEY:-}
      # ── Storage ──
      - AGENT_AUDIT_STORAGE_BACKEND=${AGENT_AUDIT_STORAGE_BACKEND:-postgresql}
      - AGENT_AUDIT_AUDIT_DIR=${AGENT_AUDIT_AUDIT_DIR:-./audit_logs}
      # ── API ──
      - AGENT_AUDIT_API_HOST=0.0.0.0
      - AGENT_AUDIT_API_PORT=8081
      - AGENT_AUDIT_API_KEYS=${AGENT_AUDIT_API_KEYS:-}
      # WARNING: empty string blocks all origins -- set to specific domains in production
      - AGENT_AUDIT_CORS_ORIGINS=${AGENT_AUDIT_CORS_ORIGINS:-http://localhost}
      # ── LLM Tracing ──
      - AGENT_AUDIT_AUTO_TRACE=${AGENT_AUDIT_AUTO_TRACE:-0}
      - AGENT_AUDIT_TRACE_PII_REDACT=${AGENT_AUDIT_TRACE_PII_REDACT:-0}
      - AGENT_AUDIT_TRACE_MAX_LEN=${AGENT_AUDIT_TRACE_MAX_LEN:-4000}
      - AGENT_AUDIT_TRACE_COST_MODEL=${AGENT_AUDIT_TRACE_COST_MODEL:-openai}
      # ── Logging ──
      - AGENT_AUDIT_LOG_LEVEL=${AGENT_AUDIT_LOG_LEVEL:-info}
      - AGENT_AUDIT_LOG_FORMAT=${AGENT_AUDIT_LOG_FORMAT:-json}
      # ── Notifications (optional) ──
      - AGENT_AUDIT_SLACK_WEBHOOK=${AGENT_AUDIT_SLACK_WEBHOOK:-}
      - AGENT_AUDIT_SMTP_HOST=${AGENT_AUDIT_SMTP_HOST:-}
      - AGENT_AUDIT_NOTIFY_ON_FAILURE=${AGENT_AUDIT_NOTIFY_ON_FAILURE:-0}
      # ── Signing & Encryption (optional) ──
      - AGENT_AUDIT_SIGNING_KEY=${AGENT_AUDIT_SIGNING_KEY:-}
      - AGENT_AUDIT_ENCRYPTION_KEY=${AGENT_AUDIT_ENCRYPTION_KEY:-}
      - AGENT_AUDIT_SIGNING_KEY_PASSWORD=${AGENT_AUDIT_SIGNING_KEY_PASSWORD:-}
      # ── Evidence (optional) ──
      - AGENT_AUDIT_EVIDENCE_STORE=${AGENT_AUDIT_EVIDENCE_STORE:-}
    volumes:
      - audit_logs:/app/audit_logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend

  # ════════════════════════════════════════════════════════════════════════
  #  db — PostgreSQL 15 (primary data store)
  # ════════════════════════════════════════════════════════════════════════
  #  SECURITY: POSTGRES_PASSWORD MUST be set in .env for production.
  #  The container will fail to start if POSTGRES_PASSWORD is not provided.
  db:
    image: postgres:15-alpine
    container_name: agent-audit-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-audit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_DB=${POSTGRES_DB:-agent_audit}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audit} -d ${POSTGRES_DB:-agent_audit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # ════════════════════════════════════════════════════════════════════════
  #  redis — caching, rate limiting, pub/sub (future)
  # ════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: agent-audit-redis
    command: >
      redis-server
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

# ══════════════════════════════════════════════════════════════════════════
#  Named volumes (survive container recreation)
# ══════════════════════════════════════════════════════════════════════════
volumes:
  pgdata:
    name: agent-audit-pgdata
  redisdata:
    name: agent-audit-redisdata
  audit_logs:
    name: agent-audit-logs

# ══════════════════════════════════════════════════════════════════════════
#  Networks (frontend isolated from direct DB/Redis access)
# ══════════════════════════════════════════════════════════════════════════
networks:
  frontend:
    name: agent-audit-frontend
  backend:
    name: agent-audit-backend
    internal: true
