# ═══════════════════════════════════════════════════════════════════════════
#  agent-audit v1.0 — nginx Server Blocks (HTTP + HTTPS)
# ═══════════════════════════════════════════════════════════════════════════
#
#  Two server blocks:
#    1. HTTPS (port 443) — primary, TLS termination + all application routes
#    2. HTTP  (port 80)  — redirect to HTTPS (except /health for Docker checks)
#
#  All location blocks are in common.conf (included inside the HTTPS server).
#
#  TLS certificates: /etc/nginx/ssl/cert.pem + /etc/nginx/ssl/key.pem
#  Generate self-signed certs for dev: see nginx/ssl/README.md
#
#  Mounted read-only at /etc/nginx/conf.d/default.conf in the nginx container.

upstream api_backend {
    # api = Docker Compose service name (resolved by Docker DNS)
    server api:8081;
}

# ── Rate limiting zones ──
# Per-IP rate limit: 30 req/s burst 50 for API; 5 req/s burst 10 for auth endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ═══════════════════════════════════════════════════════════════════════════
#  HTTPS server (primary) — TLS termination + all application routes
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS Certificates ──
    # For local dev, generate self-signed certs:
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout nginx/ssl/key.pem -out nginx/ssl/cert.pem -subj "/CN=localhost"
    # For production, use Let's Encrypt or your CA of choice.
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # ── Modern TLS Configuration ──
    # Ref: Mozilla SSL Configuration Generator — Intermediate profile
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling ──
    ssl_stapling on;
    ssl_stapling_verify on;
    # Resolver required for OCSP — use Docker's embedded DNS
    resolver 127.0.0.11 valid=30s;

    # ── HSTS (HTTP Strict Transport Security) ──
    # 1 year = 31536000 seconds.  Remove 'includeSubDomains' if using a subdomain.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Connection limit (per IP) ──
    limit_conn conn_limit 20;

    # ── Include shared config ──
    #    Contains: security headers, real_ip, gzip, and all location blocks.
    include /etc/nginx/conf.d/common.conf;
}

# ═══════════════════════════════════════════════════════════════════════════
#  HTTP server — redirect to HTTPS (with health check exception)
# ═══════════════════════════════════════════════════════════════════════════
#  Docker healthcheck uses wget against http://127.0.0.1:80/health, so we
#  must allow that path on HTTP without redirect.  Everything else → HTTPS.
server {
    listen 80;
    server_name _;

    # Health check — allowed on plain HTTP for Docker healthcheck
    location = /health {
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Redirect everything else to HTTPS ──
    location / {
        return 301 https://$host$request_uri;
    }
}
