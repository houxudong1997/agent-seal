apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-audit.fullname" . }}-secret
  labels:
    {{- include "agent-audit.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* DB URL: use external or auto-generate from internal PostgreSQL */}}
  AGENT_AUDIT_DB_URL: {{ include "agent-audit.dbUrl" . | quote }}
  {{- /* Redis URI */}}
  AGENT_AUDIT_REDIS_URI: {{ include "agent-audit.redisUri" . | quote }}
  {{- /* Secret key (CRITICAL — must be set in production) */}}
  AGENT_AUDIT_SECRET_KEY: {{ .Values.config.secretKey | quote }}
  {{- /* API keys */}}
  AGENT_AUDIT_API_KEYS: {{ include "agent-audit.apiKeysString" . | quote }}
  {{- /* Slack webhook (sensitive URL) */}}
  AGENT_AUDIT_SLACK_WEBHOOK: {{ .Values.config.slackWebhook | quote }}
  {{- /* Signing & Encryption keys */}}
  AGENT_AUDIT_SIGNING_KEY: {{ .Values.config.signingKey | quote }}
  AGENT_AUDIT_ENCRYPTION_KEY: {{ .Values.config.encryptionKey | quote }}
  {{- /* Internal PostgreSQL password (auto-generated when postgresql.enabled=true) */}}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
